    </div>
  </section>

  <!-- Quiz Screen -->

      <div class="progress-container">
        <div class="progress-bar">

      </div>
    </div>
  </section>

  <!-- Result Screen -->
  <section id="result" class="screen">
    <div class="glass-card result-card">
      <div class="result-reveal" id="resultReveal">
        <div class="power-meter" id="powerMeter">

        </div>

        <h2 class="result-type" id="resultType"></h2>
        <h3 class="result-title" id="resultTitle"></h3>

        <div class="result-traits" id="resultTraits"></div>

      </div>
      <div class="result-actions">
        <button id="shareBtn" class="btn-primary btn-share" data-i18n="result.share">결과 공유하기</button>
        <button id="retryBtn" class="btn-secondary" data-i18n="result.retry">다시 테스트하기</button>
      </div>
    </div>
  </section>
